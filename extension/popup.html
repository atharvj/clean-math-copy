<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Clean Math Copy</title>
  <style>
    body { width:270px; margin:0; padding:10px; color:#eee; background:#292a2d;
      font:14px/1.35 system-ui,-apple-system,"Segoe UI",sans-serif; }
    h1 { margin:2px 6px 9px; font-size:14px; }
    button { width:100%; margin:2px 0; padding:8px 10px; border:0; border-radius:5px;
      color:#eee; background:transparent; text-align:left; font:inherit; cursor:pointer; }
    button:hover, button:focus-visible { background:#3c4043; outline:none; }
    button[aria-pressed="true"] { background:#3c4043; font-weight:600; }
  </style>
</head>
<body>
  <h1>Clean Math Copy</h1>
  <button type="button" data-mode="faithful" data-label="Faithful readable (recommended)"></button>
  <button type="button" data-mode="calculator" data-label="Calculator-safe"></button>
  <button type="button" data-mode="latex" data-label="Original LaTeX"></button>
  <button type="button" data-mode="native" data-label="Original copy/paste"></button>
  <script src="popup.js"></script>
</body>
</html>
